server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri /index.html;
    }

    # Exact match for /api/data
    location = /api/data {
        proxy_pass http://asset-service:5001/api/data;
    }

    # Asset service — no trailing slash
    location /api/asset {
        proxy_pass http://asset-service:5001/api/asset;
    }

    # Incident service — no trailing slash
    location /api/incident {
        proxy_pass http://incident-service:5002/api/incident;
    }
}
