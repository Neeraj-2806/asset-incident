apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Neeraj-2806/asset-incident.git
    targetRevision: main
    path: helm/frontend
    helm:
      valueFiles:
        - ../../gitops/values/dev/frontend.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
