{{- if .Values.incidentService.enabled }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: incident-service-configmap
  labels:
    {{- include "incident-service.labels" . | nindent 4 }}
data:
  {{- range $key, $value := .Values.incidentService.env }}
  {{ $key }}: "{{ $value }}"
  {{- end }}

{{- end }}
