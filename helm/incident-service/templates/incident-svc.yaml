{{- if .Values.incidentService.enabled }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "incident-service.fullname" . }}
  labels:
    {{- include "incident-service.labels" . | nindent 4 }}
spec:
  type: {{ .Values.incidentService.service.type }}
  selector:
    {{- include "incident-service.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.incidentService.service.port }}
      targetPort: {{ .Values.incidentService.service.port }}

{{- end }}
